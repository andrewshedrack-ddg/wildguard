<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WildGuard Animal Library</title>
    <link href="/static/vendor/fonts.css" rel="stylesheet" />
    <link rel="stylesheet" href="styles-pro.css" />
  </head>
  <body>
    <div class="slideshow-bg" aria-hidden="true"></div>
    <div class="overlay-mask" aria-hidden="true"></div>
    <header class="site-nav">
      <div class="nav-inner">
        <a class="nav-brand" href="/">
          <img src="https://images.unsplash.com/photo-1546182990-dffeafbe841d?auto=format&fit=crop&w=256&q=80" alt="WildGuard" onerror="this.onerror=null;this.src='/static/tiger-logo.svg';" />
          <span>WildGuard</span>
        </a>
        <nav class="nav-links">
          <a href="/">Home</a>
          <a href="/dashboard">Dashboard</a>
          <a href="/library">Library</a>
          <a href="/history">History</a>
          <a href="/map">Map</a>
          <a href="/live">Live</a>
        </nav>
      </div>
    </header>
    <main class="layout single">
      <section class="panel telemetry">
        <div class="panel-head">
          <h1>Global Animal Library</h1>
          <p>Interactive intelligence library across animals, reptiles, birds, insects, fungi, bacteria, and viruses.</p>
        </div>
        <div class="stack">
          <div class="lookup-row">
            <input id="librarySearch" type="text" placeholder="Search species, region, alias" />
            <select id="libraryGroup">
              <option value="">All Classes / Groups</option>
              <option value="Mammalia">Mammalia</option>
              <option value="Aves">Aves</option>
              <option value="Reptilia">Reptilia</option>
              <option value="Amphibia">Amphibia</option>
              <option value="Insecta">Insecta</option>
              <option value="Arachnida">Arachnida</option>
              <option value="Actinopterygii">Fish</option>
              <option value="Agaricomycetes">Fungi</option>
              <option value="Gammaproteobacteria">Bacteria</option>
              <option value="Pisoniviricetes">Virus</option>
            </select>
            <button id="librarySearchBtn" type="button">Search</button>
          </div>
          <div class="lookup-row">
            <button id="librarySeedBtn" type="button">Seed Foundation Data</button>
            <button id="librarySyncMammalsBtn" type="button">Sync Mammals</button>
            <button id="librarySyncBirdsBtn" type="button">Sync Birds</button>
            <button id="librarySyncInsectsBtn" type="button">Sync Insects</button>
          </div>
          <div id="libraryMeta" class="profile-box">Loading species...</div>
        </div>
        <div id="libraryGrid" class="gallery-grid large-grid"></div>
        <div id="libraryDetail" class="profile-box">Select a species card for richer details and voice summary.</div>
      </section>
    </main>
    <script src="index-pro.js"></script>
    <script src="app.js"></script>
    <script src="library.js" type="module"></script>
  </body>
</html>
