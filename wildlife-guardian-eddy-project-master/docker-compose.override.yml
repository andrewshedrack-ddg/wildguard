version: '3.8'
services:
  web:
    environment:
      - DATABASE_URL=sqlite:///./data/wildlife.db
      - JWT_SECRET_KEY=super-secret-local
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app:rw
      - ./data:/app/data:rw
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
