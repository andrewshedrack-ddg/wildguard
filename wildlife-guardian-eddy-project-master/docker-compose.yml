version: '3.8'
services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://wildguard:secret@db:5432/wildguard
      - IMAGE_SAVE_DIR=/data/images
    depends_on:
      - db
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: wildguard
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: wildguard
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
